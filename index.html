<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>독도 2100 선교대회 - Vanilla TS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Hero Section -->
    <section id="hero" class="bright-gradient">
      <div class="hero-content">
        <h1>독도 2100<br />선교대회</h1>
        <p>미래를 향한 찬양, 독도에서 시작됩니다</p>
        <div class="scroll-arrow">↓</div>
      </div>
    </section>

    <!-- Scroll Sequence Section -->
    <div id="scroll-container">
      <div id="sticky-viewport">
        <div id="image-sequence">
          <!-- Images will be injected/managed by main.ts -->
        </div>
        <div class="scroll-text">
          <h2>함께 기도하고 예배하는 미래</h2>
        </div>
      </div>
    </div>

    <!-- Footer / CTA -->
    <section id="footer">
      <h3>지금 바로 참여하세요!</h3>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSeIK9O8NYCdQO3k-uEaWuT_nVKSsQjBw8Ga_-l6uJRzrpGfWQ/viewform" target="_blank" rel="noopener noreferrer" class="cta-button">
        참여신청하러가기
      </a>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

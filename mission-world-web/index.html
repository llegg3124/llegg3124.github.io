<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>선교, 독도, 그리고 세계</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- Hero Section -->
    <section id="hero" class="deep-blue-gradient">
      <div class="hero-content">
        <h1>선교, 독도,<br />그리고 세계</h1>
        <p>우리에게 맡겨진 사명, 땅 끝까지 전합니다</p>
        <div class="scroll-arrow">↓</div>
      </div>
    </section>

    <!-- Scroll Sequence Section -->
    <div id="scroll-container">
      <div id="sticky-viewport">
        <div id="image-sequence">
          <!-- Images will be injected/managed by main.ts -->
        </div>
        <div id="scroll-text-container" class="scroll-text">
          <h2 id="dynamic-text">세계를 향한 첫 걸음</h2>
        </div>
      </div>
    </div>

    <!-- Footer / CTA -->
    <section id="footer">
      <h3>열방을 품는 사역에 함께하세요</h3>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSeIK9O8NYCdQO3k-uEaWuT_nVKSsQjBw8Ga_-l6uJRzrpGfWQ/viewform" target="_blank" rel="noopener noreferrer" class="cta-button">
        사역 참여 신청하기
      </a>
    </section>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
